name: secret-scan

# 秘匿情報の誤コミットを機械的に検出する（Cosmo Infrastructure 憲法 Phase 1 から常時稼働）。
# gitleaks-action@v2 は GitHub 組織アカウントだと有料ライセンス必須のため、個人/組織どちらでも
# 無料で動く gitleaks バイナリの直接実行に統一（cosmo-infrastructure と同方式）。
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          url=$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" \
            https://api.github.com/repos/gitleaks/gitleaks/releases/latest \
            | grep -oE 'https://[^"]+linux_x64\.tar\.gz' | head -1)
          echo "downloading: $url"
          curl -fsSL "$url" -o /tmp/gitleaks.tgz
          tar -xzf /tmp/gitleaks.tgz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Scan full git history
        run: gitleaks detect --source . --redact --verbose --exit-code 1
